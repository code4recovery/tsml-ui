name: Build

on:
  push:
    branches: [main]

jobs:
  tests:
    uses: ./.github/workflows/reusable-test.yml

  build:
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
